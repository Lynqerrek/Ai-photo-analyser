<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens — AI Photo Analyser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05050a;
  --surface: #0c0c14;
  --surface2: #10101a;
  --surface3: #161620;
  --border: #1c1c2e;
  --border2: #252538;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.07);
  --accent-glow: rgba(200,255,0,0.15);
  --accent2: #00ffc8;
  --accent2-dim: rgba(0,255,200,0.07);
  --text: #f0f0f5;
  --muted: #42425a;
  --muted2: #7070a0;
  --error: #ff4d6a;
  --r: 12px;
  --r-sm: 8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { -webkit-font-smoothing:antialiased; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'JetBrains Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.25rem 6rem;
  font-size: 13.5px;
  line-height: 1.6;
  /* Subtle background grid */
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(200,255,0,0.04) 0%, transparent 70%),
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 100% 100%, 40px 40px, 40px 40px;
}

/* ── Header ────────────────────────────────────────────── */
header {
  width: 100%;
  max-width: 700px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
  position: relative;
}

header::after {
  content:'';
  position:absolute; bottom:-1px; left:0;
  width:60px; height:1px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.logo { display:flex; align-items:center; gap:.85rem; }
.logo h1 {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:1.8rem; letter-spacing:-2px;
  color:var(--accent); line-height:1;
  text-shadow: 0 0 30px rgba(200,255,0,0.25);
}

.logo-divider {
  width:1px; height:18px;
  background: var(--border2);
}

.logo .sub {
  font-family:'Inter',sans-serif;
  font-size:10.5px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted2);
  font-weight:400;
}

.badge {
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted2);
  border:1px solid var(--border2);
  background: var(--surface2);
  padding:.3rem .75rem; border-radius:20px;
  display:flex; align-items:center; gap:.45rem;
}

.badge::before {
  content:'';
  width:5px; height:5px; border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 6px var(--accent);
  flex-shrink:0;
}

/* ── Container ─────────────────────────────────────────── */
.container { width:100%; max-width:700px; display:flex; flex-direction:column; gap:1rem; }

/* ── Upload zone ───────────────────────────────────────── */
.upload-zone {
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:3.5rem 2rem;
  text-align:center;
  cursor:pointer;
  transition:border-color .25s, background .25s, box-shadow .25s;
  position:relative;
  background:var(--surface);
  user-select:none;
  overflow:hidden;
}

.upload-zone::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(200,255,0,0.04) 0%, transparent 70%);
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
}

.upload-zone:hover::before,
.upload-zone.drag-over::before { opacity:1; }

.upload-zone:hover, .upload-zone.drag-over {
  border-color:rgba(200,255,0,.35);
  background: var(--surface2);
  box-shadow: 0 0 0 1px rgba(200,255,0,.08), 0 20px 60px rgba(0,0,0,.4);
}

.upload-zone input[type="file"] {
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
}

.upload-icon {
  width:52px; height:52px; margin:0 auto 1.25rem;
  border:1px solid var(--border2); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; background:var(--surface3);
  transition:border-color .25s, background .25s, transform .25s;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}

.upload-zone:hover .upload-icon {
  border-color:rgba(200,255,0,.4);
  background:rgba(200,255,0,.06);
  transform:scale(1.05);
}

.upload-label {
  color:var(--muted2); font-size:13px;
  font-family:'Inter',sans-serif; font-weight:400;
}
.upload-label strong { color:var(--text); font-weight:500; }
.upload-formats {
  margin-top:.5rem; font-size:10px; color:var(--muted);
  letter-spacing:.12em; font-family:'JetBrains Mono',monospace;
}

/* ── Preview ───────────────────────────────────────────── */
#preview-wrap {
  display:none; position:relative;
  border-radius:var(--r); overflow:hidden;
  border:1px solid var(--border2); background:#030306;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}

#preview-img { width:100%; max-height:440px; object-fit:contain; display:block; }

#clear-btn {
  position:absolute; top:.75rem; right:.75rem;
  background:rgba(5,5,10,.88); backdrop-filter:blur(12px);
  border:1px solid var(--border2); color:var(--muted2);
  padding:.35rem .75rem; border-radius:20px; cursor:pointer;
  font-family:'Inter',sans-serif; font-size:11px; font-weight:500;
  letter-spacing:.02em; transition:all .15s;
}
#clear-btn:hover { color:var(--error); border-color:rgba(255,77,106,.4); background:rgba(255,77,106,.08); }

/* ── Tags ──────────────────────────────────────────────── */
#tags-row { display:none; gap:.4rem; flex-wrap:wrap; align-items:center; }

.tag-label {
  font-family:'Inter',sans-serif;
  font-size:10px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.1em; margin-right:.1rem;
}

.tag {
  padding:.25rem .65rem; font-size:10px; border-radius:20px;
  text-transform:uppercase; letter-spacing:.08em; font-weight:500;
  border:1px solid var(--border2); color:var(--muted2); background:var(--surface2);
  font-family:'Inter',sans-serif;
  transition:all .15s;
}

.tag.subject {
  border-color:rgba(200,255,0,.25); color:var(--accent);
  background:var(--accent-dim);
}

.tag.language {
  border-color:rgba(0,255,200,.25); color:var(--accent2);
  background:rgba(0,255,200,.06);
}

.tag.homework {
  border-color:rgba(255,159,67,.25); color:#ff9f43;
  background:rgba(255,159,67,.07);
}

.tag.general {
  border-color:rgba(162,155,254,.25); color:#a29bfe;
  background:rgba(162,155,254,.07);
}

/* ── Input row ─────────────────────────────────────────── */
.input-row {
  display:flex; gap:.6rem;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:.35rem .35rem .35rem .9rem;
  transition:border-color .2s, box-shadow .2s;
}

.input-row:focus-within {
  border-color:rgba(200,255,0,.3);
  box-shadow:0 0 0 3px rgba(200,255,0,.06);
}

#question {
  flex:1; background:transparent; border:none;
  color:var(--text); font-family:'Inter',sans-serif;
  font-size:13.5px; padding:.5rem 0; outline:none;
  min-width:0; font-weight:400;
}

#question::placeholder { color:var(--muted2); }

#analyse-btn {
  background:var(--accent); color:#000; border:none;
  border-radius:var(--r-sm);
  font-family:'Syne',sans-serif;
  font-weight:700; font-size:12px; padding:.6rem 1.3rem;
  cursor:pointer; transition:filter .15s, transform .1s, box-shadow .15s;
  white-space:nowrap; letter-spacing:.04em; text-transform:uppercase; flex-shrink:0;
}
#analyse-btn:hover {
  filter:brightness(1.1);
  box-shadow:0 0 20px rgba(200,255,0,.3);
}
#analyse-btn:active { transform:scale(.96); }
#analyse-btn:disabled { opacity:.3; cursor:not-allowed; filter:none; box-shadow:none; }

/* ── Progress bar ──────────────────────────────────────── */
#progress { height:2px; background:var(--border); overflow:hidden; display:none; border-radius:2px; }
#progress.active { display:block; }
#progress-inner {
  height:100%; width:35%;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
  animation:sweep 1.4s ease-in-out infinite;
}
@keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(420%)} }

/* ── Result box ────────────────────────────────────────── */
#result-box {
  display:none; background:var(--surface);
  border:1px solid var(--border2); border-radius:var(--r); overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.35);
  animation:slideUp .25s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.result-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.65rem 1rem; background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.rhl { display:flex; align-items:center; gap:.55rem; }

.pulse {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent); flex-shrink:0;
  box-shadow:0 0 6px rgba(200,255,0,.5);
}

.pulse.on {
  animation:pulsate .9s ease-in-out infinite;
  box-shadow:0 0 10px rgba(200,255,0,.6);
}

@keyframes pulsate { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.6)} }

.result-header span {
  font-family:'Inter',sans-serif;
  font-size:11px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--muted2); font-weight:500;
}

#copy-btn {
  display:none; background:none;
  border:1px solid var(--border2); color:var(--muted2);
  padding:.25rem .75rem; border-radius:20px;
  font-family:'Inter',sans-serif; font-size:10px; font-weight:500;
  letter-spacing:.04em; text-transform:uppercase;
  cursor:pointer; transition:all .15s;
}
#copy-btn:hover { color:var(--text); border-color:var(--muted2); background:var(--surface3); }
#copy-btn.copied { color:var(--accent); border-color:rgba(200,255,0,.35); background:var(--accent-dim); }

/* ── Answer text ───────────────────────────────────────── */
#result-text {
  padding:1.35rem 1.1rem; color:#cccce0;
  font-family:'Inter',sans-serif;
  font-size:13.5px; line-height:1.85; word-break:break-word;
}

#result-text h1,#result-text h2,#result-text h3 {
  font-family:'Syne',sans-serif; color:var(--text); margin:.9rem 0 .35rem; line-height:1.3;
}
#result-text h1{font-size:1.1rem} #result-text h2{font-size:1rem} #result-text h3{font-size:.9rem;color:var(--muted2)}
#result-text p{margin-bottom:.65rem} #result-text p:last-child{margin-bottom:0}
#result-text strong{color:var(--text);font-weight:600}
#result-text em{color:var(--muted2)}

#result-text code{
  font-family:'JetBrains Mono',monospace;
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:5px;padding:.12em .45em;font-size:12px;color:var(--accent2)
}
#result-text pre{
  font-family:'JetBrains Mono',monospace;
  background:#030308;border:1px solid var(--border);
  border-radius:var(--r-sm);padding:1rem;overflow-x:auto;margin:.7rem 0
}
#result-text pre code{background:none;border:none;padding:0;color:#a8d8f0;font-size:12px}
#result-text ul,#result-text ol{padding-left:1.5rem;margin-bottom:.55rem}
#result-text li{margin-bottom:.25rem}
#result-text hr{border:none;border-top:1px solid var(--border);margin:.9rem 0}
#result-text blockquote{
  border-left:2px solid rgba(200,255,0,.4);padding-left:.9rem;
  color:var(--muted2);margin:.6rem 0;font-style:italic;
}
#result-text table{width:100%;border-collapse:collapse;font-size:12.5px;margin:.6rem 0}
#result-text th{
  background:var(--surface3);color:var(--muted2);
  padding:.4rem .75rem;border:1px solid var(--border2);
  text-align:left;font-weight:600;font-family:'Inter',sans-serif;
}
#result-text td{padding:.35rem .75rem;border:1px solid var(--border)}

.cursor-blink {
  display:inline-block; width:2px; height:15px;
  background:var(--accent); vertical-align:text-bottom;
  border-radius:1px; animation:blink .7s steps(1) infinite; margin-left:2px;
  box-shadow:0 0 6px var(--accent);
}
@keyframes blink{50%{opacity:0}}

/* ── Toast ─────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:1.75rem; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--surface2);
  border:1px solid var(--border2);
  backdrop-filter:blur(16px);
  color:var(--muted2); padding:.55rem 1.1rem; border-radius:20px;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; z-index:9999; white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{color:var(--accent);border-color:rgba(200,255,0,.3)}
#toast.error{color:var(--error);border-color:rgba(255,77,106,.3)}

footer{
  margin-top:3rem;font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);opacity:.4;
  font-family:'Inter',sans-serif;
}

/* ── Clarify block ─────────────────────────────────────────── */
.clarify-block {
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--r-sm);
  overflow:hidden;
  animation:slideUp .2s ease both;
}

.clarify-header {
  display:flex; align-items:center; gap:.6rem;
  padding:.65rem .9rem;
  background:var(--surface3);
  border-bottom:1px solid var(--border);
}

.clarify-icon { font-size:1.1rem; flex-shrink:0; }

.clarify-title {
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  color:var(--muted2); letter-spacing:.02em;
}

.clarify-fields {
  padding:.75rem .9rem;
  display:flex; flex-direction:column; gap:.7rem;
}

.clarify-field {
  display:flex; flex-direction:column; gap:.35rem;
}

.clarify-q {
  font-family:'Inter',sans-serif; font-size:13px;
  color:var(--text); font-weight:500; line-height:1.4;
}

.clarify-input {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r-sm);
  color:var(--text);
  font-family:'Inter',sans-serif; font-size:13px;
  padding:.5rem .75rem; outline:none;
  transition:border-color .15s;
}
.clarify-input:focus { border-color:rgba(200,255,0,.35); }
.clarify-input::placeholder { color:var(--muted); }

.clarify-submit {
  margin:.1rem .9rem .85rem;
  background:var(--accent); color:#000; border:none;
  border-radius:var(--r-sm); font-family:'Syne',sans-serif;
  font-weight:700; font-size:12px; padding:.55rem 1.2rem;
  cursor:pointer; transition:filter .15s, transform .1s;
  letter-spacing:.04em; text-transform:uppercase; align-self:flex-start;
  display:inline-block;
}
.clarify-submit:hover { filter:brightness(1.12); }
.clarify-submit:active { transform:scale(.96); }

/* ── Structured task/answer blocks ────────────────────────── */

/* Main task group wrapper */
.task-group {
  border:1px solid var(--border2);
  border-radius:var(--r-sm);
  overflow:hidden;
  margin-bottom:.85rem;
  animation:slideUp .2s ease both;
  background:var(--surface);
}
.task-group:last-child { margin-bottom:0; }

/* Main task header row */
.task-label {
  display:flex; align-items:baseline; gap:.7rem;
  padding:.65rem .9rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.task-number {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:1rem; color:var(--text); line-height:1; flex-shrink:0;
}

.task-text {
  font-family:'Inter',sans-serif; font-size:13.5px;
  color:var(--text); font-weight:500; line-height:1.5;
}
.task-text strong { color:var(--accent); font-weight:600; }

/* Main task answer (when no subtasks) */
.answer-block {
  padding:.75rem .9rem;
  font-family:'Inter',sans-serif; font-size:13.5px;
  line-height:1.85; color:#cccce0;
  border-top:1px solid var(--border);
}
.answer-block:first-child { border-top:none; }
.answer-block strong { color:var(--accent); font-weight:600; }
.answer-block p { margin-bottom:.5rem; }
.answer-block p:last-child { margin-bottom:0; }
.answer-block em { color:var(--muted2); }
.answer-block ul,.answer-block ol { padding-left:1.4rem; margin-bottom:.4rem; }
.answer-block li { margin-bottom:.15rem; }

/* Subtask container — indented under main task */
.subtask-list {
  border-top:1px solid var(--border);
}

/* Individual subtask row */
.subtask-block {
  display:flex;
  border-bottom:1px solid var(--border);
}
.subtask-block:last-child { border-bottom:none; }

/* Left indent line — visual "belongs to parent" connector */
.subtask-indent {
  width:2px;
  flex-shrink:0;
  background:var(--border2);
  margin:0 0 0 1.35rem;
}

.subtask-inner {
  flex:1; min-width:0; padding:0;
}

.subtask-label {
  display:flex; align-items:baseline; gap:.6rem;
  padding:.45rem .75rem .45rem .6rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.subtask-number {
  font-family:'JetBrains Mono',monospace; font-weight:500;
  font-size:11px; color:var(--muted2); line-height:1;
  flex-shrink:0; letter-spacing:.03em;
}

.subtask-text {
  font-family:'Inter',sans-serif; font-size:12.5px;
  color:var(--muted2); font-weight:400; line-height:1.5;
}
.subtask-text strong { color:var(--text); }

.subtask-answer {
  padding:.5rem .75rem .5rem .6rem;
  font-family:'Inter',sans-serif; font-size:13px;
  line-height:1.8; color:#cccce0;
  background:var(--surface);
}
.subtask-answer strong { color:var(--accent); font-weight:600; }
.subtask-answer p { margin-bottom:.35rem; }
.subtask-answer p:last-child { margin-bottom:0; }

/* ── Mode switcher ─────────────────────────────────────── */
.mode-row {
  display:none; gap:.5rem;
}
.mode-btn {
  flex:1; padding:.6rem 1rem;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r); color:var(--muted2);
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all .2s; text-align:center;
  letter-spacing:.02em;
}
.mode-btn:hover { border-color:var(--accent); color:var(--text); }
.mode-btn.active {
  background:var(--accent-dim); border-color:rgba(200,255,0,.4);
  color:var(--accent);
}

/* ── Ask mode UI ───────────────────────────────────────── */
#ask-box {
  display:none; flex-direction:column; gap:.85rem;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r); overflow:hidden;
  animation:slideUp .25s cubic-bezier(.16,1,.3,1) both;
}

.ask-header {
  display:flex; align-items:center; gap:.55rem;
  padding:.65rem 1rem; background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.ask-header span {
  font-family:'Inter',sans-serif; font-size:11px;
  letter-spacing:.06em; text-transform:uppercase;
  color:var(--muted2); font-weight:500;
}

.ask-progress-dots {
  display:flex; gap:.4rem; margin-left:auto;
}

.ask-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--border2); transition:background .3s;
}
.ask-dot.done { background:var(--accent); box-shadow:0 0 6px rgba(200,255,0,.5); }
.ask-dot.active { background:var(--accent2); animation:pulsate .9s ease-in-out infinite; }

.ask-body { padding:.1rem 1rem 1rem; display:flex; flex-direction:column; gap:.75rem; }

.ask-question {
  font-family:'Inter',sans-serif; font-size:14.5px;
  font-weight:600; color:var(--text); line-height:1.45;
}

.ask-choices {
  display:flex; flex-direction:column; gap:.45rem;
}

.ask-choice {
  display:flex; align-items:center; gap:.75rem;
  padding:.7rem .9rem;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:var(--r-sm); cursor:pointer;
  font-family:'Inter',sans-serif; font-size:13px; color:var(--muted2);
  transition:all .15s; user-select:none;
}
.ask-choice:hover { border-color:rgba(200,255,0,.3); color:var(--text); background:var(--surface3); }
.ask-choice.selected { border-color:rgba(200,255,0,.5); color:var(--accent); background:var(--accent-dim); }
.ask-choice.correct  { border-color:rgba(0,255,200,.5); color:var(--accent2); background:rgba(0,255,200,.07); }

<script>
// ─────────────────────────────────────────────────────────────────────────────
// LENS — Mistral AI (free, works in Poland, EU servers, no balance needed)
// Free Experiment plan: 1B tokens/month, no credit card, just phone number
// Sign up: console.mistral.ai → Billing → Experiment for free → API Keys
//
// VISION  → pixtral-12b        : dedicated vision model, reads the image
// SOLVING → mistral-large-latest: best reasoning model, answers everything
// ─────────────────────────────────────────────────────────────────────────────
const MISTRAL_KEY  = 'bTTD9pnTZM1luO3lr5FIJtDLi2aWgcbq';
const MISTRAL_URL  = 'https://api.mistral.ai/v1/chat/completions';
const MODEL_VISION = 'pixtral-large-latest';
const MODEL_SOLVER = 'mistral-large-latest';

// ─────────────────────────────────────────────────────────────────────────────
// PROMPTS
// ─────────────────────────────────────────────────────────────────────────────
const SYS_TRANSCRIBE = `You are a precise OCR and content-extraction engine. You always have an image to work with.

Extract and output a complete verbatim transcript of EVERYTHING visible in the image: all text, numbers, symbols, equations, answer options, labels, diagrams labels, table contents, handwriting.

Rules:
- Plain text only, preserving original structure exactly (numbered questions, lettered options, tables, columns)
- Math/science: reproduce every symbol, subscript, superscript, fraction, equation exactly as written
- Foreign language: copy exactly with all accents, special characters, diacritics preserved
- Handwriting: read and transcribe as accurately as possible
- NEVER answer, solve, translate, explain or comment — output the raw content only
- If truly no readable text anywhere: output [NO TEXT]
- Never say you cannot see an image or that no image was provided — one always is`;

const SYS_SOLVE = `You are a friendly, smart helper — like that classmate who actually gets it. You receive content from an image and answer naturally.

━━━ LANGUAGE — CRITICAL ━━━
Detect the language the USER is writing in from their question or instructions.
If the user writes in English → respond in English.
If the user writes in Polish → respond in Polish.
If there is no user question (blank input) → respond in English by default.
EXCEPTION: if the task itself explicitly asks you to write text IN a specific language
(e.g. "napisz wypracowanie po polsku" / "write an essay in Polish"), then the essay
body is in that language, but your explanation around it stays in the user's language.
Never pick a language based on the image content alone — always follow the user.

━━━ TONE ━━━
- Casual, warm, natural — like a smart friend helping with homework
- Never sound like a computer or textbook
- Short and clear — get to the point but make it easy to follow

━━━ CRITICAL — STRUCTURED OUTPUT FORMAT ━━━
When the image has 2 or more numbered tasks/questions, you MUST use tags. No exceptions.
Answer EVERY SINGLE task. If there are 5 tasks, output 5 blocks. Never skip one.

SIMPLE TASK (no subtasks):
[TASK:1]Task text here[/TASK]
[ANSWER]Your answer here[/ANSWER]

TASK WITH SUBTASKS (a/b/c or i/ii or nested numbers):
[TASK:2]Main task text[/TASK]
[SUBTASK:2.1]Subtask a text[/SUBTASK]
[SUBTASK_ANSWER]Answer to subtask a[/SUBTASK_ANSWER]
[SUBTASK:2.2]Subtask b text[/SUBTASK]
[SUBTASK_ANSWER]Answer to subtask b[/SUBTASK_ANSWER]

ABSOLUTE RULES — never break these:
- Start EVERY multi-task response with [TASK:1] — no intro text before it
- End EVERY task's answer before starting the next [TASK:N]
- [TASK:N] number = original task number exactly. Task 3 = [TASK:3]. Always.
- Never put text OUTSIDE of tags when using the structured format
- Never skip a task. Never merge two tasks into one block.
- Only use free flowing text (no tags) when there is exactly ONE question total
- Inside [ANSWER] and [SUBTASK_ANSWER]: write steps on separate lines, **bold** final results

━━━ WHEN TO ASK CLARIFICATION QUESTIONS ━━━
Some tasks genuinely require personal information from the user before you can answer correctly.
In those cases, output a [CLARIFY] block with multiple targeted questions instead of answering.

Use [CLARIFY] when the task needs info you cannot know, for example:
- Writing tasks about personal experience: "write about your holiday", "describe your family", "write about yourself"
- Tasks requiring gender for grammar (Polish, German, French etc.): verb/adjective endings depend on who is writing
- Tasks where the answer depends on personal preference or choice the user must make
- Genuinely ambiguous tasks where multiple valid answers exist

Format — list each question on its own line with a dash:
[CLARIFY]
- Question one?
- Question two?
- Question three?
[/CLARIFY]

For a "write about your holiday" task in Polish, good clarification questions would be:
- What is your gender? (needed for correct Polish grammar endings)
- Where did you go on holiday?
- What did you do there? (2-3 activities)
- Did you enjoy it? What was the best part?
- Who did you go with?

For a "describe yourself" task:
- What is your gender?
- How old are you?
- What do you look like? (hair, eyes, height roughly)
- What are your hobbies?

Ask exactly the questions needed — not more, not less.
Do NOT use [CLARIFY] for tasks you can answer from the image alone (math, history, science etc.).

━━━ WORD COUNT — CRITICAL ━━━
If a task specifies a minimum word count (e.g. "napisz co najmniej 100 słów", "write at least 100 words",
"minimum 150 words"), you MUST meet or exceed that count. Count your words before finishing.
If you are short, keep writing until you reach the minimum. Never submit under the required count.
After writing, add at the end in parentheses: (Word count: N words)

━━━ WRITING STYLE FOR MATH & SCIENCE ━━━
Write like a student on paper — not a computer printout:
- Steps line by line:
  3x + 6 = 15
  3x = 9
  x = 3
- No LaTeX, no code blocks for math
- Units naturally: "5 meters", "30°C"
- End with: So **x = 3** or The answer is **42 m/s**

━━━ DO NOT ━━━
- Don't say "Based on the transcript" or "The image shows"
- Don't mention a transcript was provided
- Don't refuse by saying there's no image
- Don't add filler like "I hope this helps!"
- Don't repeat the question back

━━━ BY TYPE ━━━
MULTIPLE CHOICE → "It's B) — [option text], because [one sentence reason]."
FILL-IN-THE-BLANK → The word + brief reason if not obvious
MATH → Steps on separate lines, bold final answer
SCIENCE → Step by step for calc, simple explanation for theory
LANGUAGES → Correct form + brief grammar note if needed
HISTORY/GEOGRAPHY → Answer + one sentence context
LITERATURE → Answer from text in plain language
SINGLE QUESTION → Normal flowing answer, no tags needed`;

const SYS_CLASSIFY = `Output ONLY a raw JSON object. No markdown fences, no explanation, no text of any kind outside the JSON.
Format exactly: {"subjects":["Tag1","Tag2"],"isSchool":false}

Pick up to 3 tags that best describe the image. Choose from these categories:

SCHOOL SUBJECTS: Math, Algebra, Calculus, Geometry, Statistics, Physics, Chemistry, Biology, History, Geography, English, German, French, Spanish, Polish, Italian, Latin, Russian, Computer Science, Economics, Art, Music, Philosophy, Literature, Religion

HOMEWORK TYPES: Homework, Essay, Test, Exam, Worksheet, Exercise, Notes, Diagram, Textbook

GENERAL TOPICS: Nature, Animals, Food, Travel, Architecture, People, Sports, Gaming, Technology, Science, Space, Weather, Cars, Fashion, Fitness, Health, Music, Film, Books, Art, Photography

DOCUMENT TYPES: Letter, Document, Receipt, Invoice, Menu, Form, Screenshot, Code, Chart, Graph, Map, Poster, Sign, Handwriting, Printed Text

Set isSchool=true if the image is homework, a school exercise, exam, or textbook page. Otherwise false.
You always have an image — never say otherwise.`;

// ─────────────────────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const uploadZone  = $('upload-zone');
const fileInput   = $('file-input');
const previewWrap = $('preview-wrap');
const previewImg  = $('preview-img');
const clearBtn    = $('clear-btn');
const tagsRow     = $('tags-row');
const progressEl  = $('progress');
const questionEl  = $('question');
const analyseBtn  = $('analyse-btn');
const resultBox   = $('result-box');
const resultText  = $('result-text');
const resultLabel = $('result-label');
const pulseDot    = $('pulse-dot');
const copyBtn     = $('copy-btn');
const toastEl     = $('toast');

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let imgB64     = null;
let imgMime    = 'image/jpeg';
let imgDataUrl = null;
let busy       = false;
let rawAnswer  = '';

// ─────────────────────────────────────────────────────────────────────────────
// FILE LOADING
// ─────────────────────────────────────────────────────────────────────────────
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  if (!file.type.startsWith('image/')) { toast('Not an image file', 'error'); return; }
  imgMime    = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imgDataUrl     = e.target.result;
    imgB64         = imgDataUrl.split(',')[1];
    previewImg.src = imgDataUrl;
    previewWrap.style.display = 'block';
    uploadZone.style.display  = 'none';
    questionEl.disabled  = false;
    analyseBtn.disabled  = false;
    clearResult();
    classify();
    document.getElementById('mode-row').style.display = 'flex';
    currentMode = 'analyse';
    document.getElementById('mode-analyse').classList.add('active');
    document.getElementById('mode-ask').classList.remove('active');
    document.querySelector('.input-row').style.display = '';
    document.getElementById('ask-box').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

clearBtn.addEventListener('click', () => {
  imgB64 = null; imgMime = 'image/jpeg'; imgDataUrl = null;
  previewImg.src = ''; previewWrap.style.display = 'none';
  uploadZone.style.display = 'block'; fileInput.value = '';
  questionEl.disabled = analyseBtn.disabled = true;
  clearResult(); clearTags();
  document.getElementById('mode-row').style.display = 'none';
  document.getElementById('ask-box').style.display = 'none';
  document.querySelector('.input-row').style.display = '';
  currentMode = 'analyse';
});

function clearResult() {
  resultBox.style.display = 'none';
  resultText.innerHTML    = '';
  copyBtn.style.display   = 'none';
  rawAnswer = '';
}

function clearTags() {
  tagsRow.querySelectorAll('.tag').forEach(t => t.remove());
  tagsRow.style.display = 'none';
}

// ─────────────────────────────────────────────────────────────────────────────
// MISTRAL API CALL
// Vision call: uses pixtral-12b with base64 image inline
// Text call:   uses mistral-large-latest, text only (faster for pass 2)
// Both use standard OpenAI-compatible messages format
// ─────────────────────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function callMistral(system, userContent, model, attempt = 0) {
  const res = await fetch(MISTRAL_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${MISTRAL_KEY}`
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: 'system', content: system },
        { role: 'user',   content: userContent }
      ],
      temperature: 0.1,
      max_tokens: model === MODEL_VISION ? 800 : 2000
    })
  });

  // Rate limit hit — wait and retry up to 3 times
  if (res.status === 429) {
    if (attempt >= 3) throw new Error('Rate limit — wait a moment and try again');
    const wait = [8000, 15000, 25000][attempt];
    toast(`Rate limit — retrying in ${wait/1000}s…`);
    await sleep(wait);
    return callMistral(system, userContent, model, attempt + 1);
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Mistral error ${res.status}`);
  }

  const data = await res.json();
  const text = data.choices?.[0]?.message?.content;
  if (!text) throw new Error('Empty response');
  return text.trim();
}

// ─────────────────────────────────────────────────────────────────────────────
// CLASSIFY — background, silent
// ─────────────────────────────────────────────────────────────────────────────
const LANGS = new Set(['german','french','spanish','polish','english','italian','latin','russian','chinese','japanese','arabic','portuguese','dutch','swedish','danish','czech','hungarian','romanian','turkish','korean']);

// Tags that get special styling
const SCHOOL_TAGS   = new Set(['math','algebra','calculus','geometry','statistics','physics','chemistry','biology','history','geography','english','german','french','spanish','polish','italian','latin','russian','computer science','economics','art','music','philosophy','literature','religion']);
const HOMEWORK_TAGS = new Set(['homework','essay','test','exam','worksheet','exercise','notes','diagram','textbook']);
const GENERAL_TAGS  = new Set(['nature','animals','food','travel','architecture','people','sports','gaming','technology','science','space','weather','cars','fashion','fitness','health','film','books','photography','letter','document','receipt','invoice','menu','form','screenshot','code','chart','graph','map','poster','sign','handwriting','printed text']);

async function classify() {
  try {
    // Pixtral accepts image_url with base64 data URL directly
    const userContent = [
      { type: 'image_url', image_url: { url: imgDataUrl } },
      { type: 'text', text: 'Classify this image.' }
    ];
    const raw = await callMistral(SYS_CLASSIFY, userContent, MODEL_VISION);
    let p;
    try { p = JSON.parse(raw.replace(/```json|```/g, '').trim()); } catch { return; }
    clearTags();
    (p.subjects || []).slice(0, 3).forEach(s => {
      const span = document.createElement('span');
      const lo = s.toLowerCase();
      if (LANGS.has(lo))          span.className = 'tag language';
      else if (SCHOOL_TAGS.has(lo)) span.className = 'tag subject';
      else if (HOMEWORK_TAGS.has(lo)) span.className = 'tag homework';
      else                         span.className = 'tag general';
      span.textContent = s;
      tagsRow.appendChild(span);
    });
    if (tagsRow.querySelectorAll('.tag').length) tagsRow.style.display = 'flex';
  } catch(e) { console.warn('classify failed:', e.message); }
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN — two-pass analysis
// Pass 1: pixtral-12b reads image → verbatim transcript
// Pass 2: mistral-large-latest solves from transcript → final answer
// ─────────────────────────────────────────────────────────────────────────────
analyseBtn.addEventListener('click', run);
questionEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !busy) run(); });

async function run() {
  if (!imgB64 || busy) return;
  busy = true;
  analyseBtn.disabled = true;
  progressEl.classList.add('active');
  clearResult();

  const q = questionEl.value.trim();
  resultLabel.textContent = q ? 'answer' : 'analysis';
  resultBox.style.display = 'block';
  pulseDot.classList.add('on');
  resultText.innerHTML = '<span class="cursor-blink"></span>';

  try {
    // Pass 1 — Pixtral reads & transcribes image
    const visionContent = [
      { type: 'image_url', image_url: { url: imgDataUrl } },
      { type: 'text', text: 'Extract all text and content from this image verbatim.' }
    ];
    const transcript = await callMistral(SYS_TRANSCRIBE, visionContent, MODEL_VISION);

    // Small pause between the two API calls to avoid rate limiting
    await sleep(2000);

    // Pass 2 — Mistral Large reasons from transcript, no image needed
    const solvePrompt =
      `TRANSCRIPT OF IMAGE CONTENT:\n${transcript}\n\n` +
      (q ? `USER QUESTION: ${q}` : 'Analyse and solve everything in this image. Answer all questions found.');

    const answer = await callMistral(SYS_SOLVE, solvePrompt, MODEL_SOLVER);

    rawAnswer = cleanForCopy(answer);
    pulseDot.classList.remove('on');
    renderMD(resultText, answer);
    copyBtn.style.display = 'block';

  } catch(err) {
    pulseDot.classList.remove('on');
    toast((err.message || 'Error').slice(0, 90), 'error');
    resultBox.style.display = 'none';
    console.error('Lens error:', err);
  } finally {
    busy = false;
    analyseBtn.disabled = false;
    progressEl.classList.remove('active');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// COPY
// ─────────────────────────────────────────────────────────────────────────────

// Strip all [TAG] and [/TAG] markers, leaving only the plain answer text
function cleanForCopy(text) {
  return text
    .replace(/\[TASK:\d+\]/g, '')
    .replace(/\[\/TASK\]/g, '')
    .replace(/\[ANSWER\]/g, '')
    .replace(/\[\/ANSWER\]/g, '')
    .replace(/\[SUBTASK:[^\]]+\]/g, '')
    .replace(/\[\/SUBTASK\]/g, '')
    .replace(/\[SUBTASK_ANSWER\]/g, '')
    .replace(/\[\/SUBTASK_ANSWER\]/g, '')
    .replace(/\[CLARIFY\]/g, '')
    .replace(/\[\/CLARIFY\]/g, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}


copyBtn.addEventListener('click', async () => {
  if (!rawAnswer) return;
  let ok = false;
  if (navigator.clipboard?.writeText) {
    try { await navigator.clipboard.writeText(rawAnswer); ok = true; } catch {}
  }
  if (!ok) {
    try {
      const ta = document.createElement('textarea');
      ta.value = rawAnswer;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
      document.body.appendChild(ta); ta.focus(); ta.select();
      ok = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch {}
  }
  if (ok) {
    copyBtn.textContent = '✓ copied';
    copyBtn.classList.add('copied');
    toast('Copied!', 'ok');
    setTimeout(() => { copyBtn.textContent = 'copy'; copyBtn.classList.remove('copied'); }, 2000);
  } else {
    toast('Copy failed — select manually', 'error');
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// RENDERER — handles [TASK:N]...[/TASK] + [ANSWER]...[/ANSWER] blocks
// plus standard markdown for everything else
// ─────────────────────────────────────────────────────────────────────────────
function renderMD(el, md) {
  // Clarify block check
  var clarifyMatch = md.match(/\[CLARIFY\]([\s\S]*?)\[\/CLARIFY\]/);
  if (clarifyMatch) { el.innerHTML = renderClarify(clarifyMatch[1].trim()); return; }

  // Structured check — also catches imperfect tag output:
  // AI sometimes writes [TASK: 1] with a space, or [Task:1] with wrong case,
  // or forgets closing tags. We normalise first.
  var normalised = md
    // normalise spacing inside tags: [TASK: 1] → [TASK:1]
    .replace(/\[\s*TASK\s*:\s*(\d+)\s*\]/gi,        '[TASK:$1]')
    .replace(/\[\s*\/\s*TASK\s*\]/gi,               '[/TASK]')
    .replace(/\[\s*ANSWER\s*\]/gi,                  '[ANSWER]')
    .replace(/\[\s*\/\s*ANSWER\s*\]/gi,             '[/ANSWER]')
    .replace(/\[\s*SUBTASK\s*:\s*([^\]]+?)\s*\]/gi, '[SUBTASK:$1]')
    .replace(/\[\s*\/\s*SUBTASK\s*\]/gi,            '[/SUBTASK]')
    .replace(/\[\s*SUBTASK_ANSWER\s*\]/gi,          '[SUBTASK_ANSWER]')
    .replace(/\[\s*\/\s*SUBTASK_ANSWER\s*\]/gi,     '[/SUBTASK_ANSWER]');

  if (/\[TASK:\d+\]/.test(normalised)) {
    el.innerHTML = renderStructured(normalised);
    return;
  }

  // Fallback: if AI used numbered lines like "1. task" but no tags,
  // and there are 2+ such lines, try to auto-structure them
  var numberedLines = md.match(/^\d+\.\s+.+/gm);
  if (numberedLines && numberedLines.length >= 2) {
    el.innerHTML = renderAutoStructured(md);
    return;
  }

  el.innerHTML = renderMarkdown(md);
}

// Auto-structure fallback: when AI ignored tags but used plain numbered answers
// e.g. "1. Answer\n2. Answer\n3. Answer"
function renderAutoStructured(md) {
  // Split by lines starting with a number+dot
  var blocks = md.split(/(?=^\d+\.\s)/m).filter(function(b){ return b.trim(); });
  if (blocks.length < 2) return renderMarkdown(md);

  var html = '';
  blocks.forEach(function(block) {
    var firstLine = block.split('\n')[0];
    var rest      = block.split('\n').slice(1).join('\n').trim();
    var numMatch  = firstLine.match(/^(\d+)\.\s*(.*)/);
    if (!numMatch) { html += renderMarkdown(block); return; }
    var num      = numMatch[1];
    var taskText = numMatch[2].trim();
    // If rest is empty, the whole text is the answer
    var ansText  = rest || taskText;
    var showTask = rest ? taskText : '';
    html += '<div class="task-group">'
      + '<div class="task-label">'
      + '<span class="task-number">' + num + '.</span>'
      + '<span class="task-text">' + renderInline(showTask || '&nbsp;') + '</span>'
      + '</div>'
      + '<div class="answer-block">' + renderMarkdown(ansText) + '</div>'
      + '</div>';
  });
  return html;
}

function renderClarify(raw) {
  var lines = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var questions = lines.filter(function(l){ return l.startsWith('-'); })
                       .map(function(l){ return l.replace(/^-\s*/,''); });

  if (questions.length === 0) {
    return '<div class="clarify-block">'
      + '<div class="clarify-header"><span class="clarify-icon">\uD83E\uDD14</span>'
      + '<span class="clarify-title">I need a bit more info</span></div>'
      + '<div class="clarify-fields"><div class="clarify-field">'
      + '<label class="clarify-q">' + esc(raw.trim()) + '</label>'
      + '<input class="clarify-input" type="text" placeholder="Your answer\u2026" id="cq-0">'
      + '</div></div>'
      + '<button class="clarify-submit" onclick="submitClarify()">Answer \u2192</button>'
      + '</div>';
  }

  var fieldsHtml = questions.map(function(q, i){
    return '<div class="clarify-field">'
      + '<label class="clarify-q">' + esc(q) + '</label>'
      + '<input class="clarify-input" type="text" placeholder="Your answer\u2026" id="cq-' + i + '">'
      + '</div>';
  }).join('');

  return '<div class="clarify-block">'
    + '<div class="clarify-header">'
    + '<span class="clarify-icon">\uD83E\uDD14</span>'
    + '<span class="clarify-title">I need a few details to answer this properly</span>'
    + '</div>'
    + '<div class="clarify-fields">' + fieldsHtml + '</div>'
    + '<button class="clarify-submit" onclick="submitClarify()">Answer \u2192</button>'
    + '</div>';
}

function submitClarify() {
  var inputs    = document.querySelectorAll('.clarify-input');
  var questions = document.querySelectorAll('.clarify-q');
  if (!inputs.length) return;
  var parts = [];
  inputs.forEach(function(inp, i) {
    var q = questions[i] ? questions[i].textContent.trim() : ('Info ' + (i+1));
    var a = inp.value.trim();
    if (a) parts.push(q + ' ' + a);
  });
  if (!parts.length) { toast('Please fill in at least one answer', 'error'); return; }
  questionEl.value = parts.join(' | ');
  questionEl.disabled = false;
  run();
}

function renderStructured(md) {
  // Split the whole response into top-level task chunks
  // Each chunk starts with [TASK:N] and ends before the next [TASK:N]
  var chunkRe = /\[TASK:(\d+)\]([\s\S]*?)\[\/TASK\]([\s\S]*?)(?=\[TASK:\d+\]|$)/g;
  var html = '';
  var m;
  var found = false;

  while ((m = chunkRe.exec(md)) !== null) {
    found = true;
    var taskNum  = m[1];
    var taskText = m[2].trim();
    var body     = m[3]; // everything after [/TASK] until next [TASK]

    // Check if this task has subtasks
    var hasSubtasks = /\[SUBTASK:/.test(body);

    html += '<div class="task-group">';
    html += '<div class="task-label">'
      + '<span class="task-number">' + taskNum + '.</span>'
      + '<span class="task-text">' + renderInline(taskText) + '</span>'
      + '</div>';

    if (!hasSubtasks) {
      // Simple task — just an answer block
      var ansMatch = body.match(/\[ANSWER\]([\s\S]*?)\[\/ANSWER\]/);
      var ansText  = ansMatch ? ansMatch[1].trim() : body.trim();
      html += '<div class="answer-block">' + renderMarkdown(ansText) + '</div>';
    } else {
      // Has subtasks — render each one indented
      html += '<div class="subtask-list">';
      var subRe = /\[SUBTASK:([^\]]+)\]([\s\S]*?)\[\/SUBTASK\]\s*\[SUBTASK_ANSWER\]([\s\S]*?)\[\/SUBTASK_ANSWER\]/g;
      var s;
      while ((s = subRe.exec(body)) !== null) {
        var subId   = s[1].trim();   // e.g. "2.1"
        var subText = s[2].trim();
        var subAns  = s[3].trim();
        // Extract just the sub-number after the dot
        var subNum  = subId.indexOf('.') !== -1 ? subId.split('.').pop() : subId;
        html += '<div class="subtask-block">'
          + '<div class="subtask-indent"></div>'
          + '<div class="subtask-inner">'
          + '<div class="subtask-label">'
          + '<span class="subtask-number">-' + subNum + '.</span>'
          + '<span class="subtask-text">' + renderInline(subText) + '</span>'
          + '</div>'
          + '<div class="subtask-answer">' + renderMarkdown(subAns) + '</div>'
          + '</div>'
          + '</div>';
      }
      html += '</div>';

      // If task also has a top-level answer alongside subtasks, show it too
      var topAns = body.match(/\[ANSWER\]([\s\S]*?)\[\/ANSWER\]/);
      if (topAns) {
        html += '<div class="answer-block">' + renderMarkdown(topAns[1].trim()) + '</div>';
      }
    }

    html += '</div>'; // close task-group
  }

  return found ? html : renderMarkdown(md);
}

function renderMarkdown(md) {
  // protect code blocks
  var codeBlocks = [];
  var s = md.replace(/```[\w]*\n?([\s\S]*?)```/g, function(_, code) {
    codeBlocks.push('<pre><code>' + esc(code.trim()) + '</code></pre>');
    return '\x02CB' + (codeBlocks.length - 1) + '\x03';
  });
  // protect inline code
  var inCode = [];
  s = s.replace(/`([^`]+)`/g, function(_, c) {
    inCode.push('<code>' + esc(c) + '</code>');
    return '\x02IC' + (inCode.length - 1) + '\x03';
  });
  // escape html
  s = esc(s);
  // restore protected blocks
  s = s.replace(/\x02CB(\d+)\x03/g, function(_, i) { return codeBlocks[+i]; });
  s = s.replace(/\x02IC(\d+)\x03/g, function(_, i) { return inCode[+i]; });
  // headers
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  // bold + italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // hr
  s = s.replace(/^---+$/gm, '<hr>');
  // blockquote
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // unordered list
  s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, function(block) {
    var items = block.trim().split('\n').map(function(l) {
      return '<li>' + l.replace(/^[ \t]*[-*+] /, '') + '</li>';
    }).join('');
    return '<ul>' + items + '</ul>';
  });
  // ordered list
  s = s.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, function(block) {
    var items = block.trim().split('\n').map(function(l) {
      return '<li>' + l.replace(/^[ \t]*\d+\. /, '') + '</li>';
    }).join('');
    return '<ol>' + items + '</ol>';
  });
  // paragraphs
  var out = s.split(/\n{2,}/).map(function(block) {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-3]|ul|ol|pre|hr|blockquote)/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return out;
}

function renderInline(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────────────────────────
// MODE SWITCHER
// ─────────────────────────────────────────────────────────────────────────────
let currentMode = 'analyse';

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('mode-analyse').classList.toggle('active', mode === 'analyse');
  document.getElementById('mode-ask').classList.toggle('active', mode === 'ask');

  const inputRow  = document.querySelector('.input-row');
  const resultBox = document.getElementById('result-box');
  const askBox    = document.getElementById('ask-box');

  if (mode === 'analyse') {
    inputRow.style.display  = '';
    resultBox.style.display = 'none';
    askBox.style.display    = 'none';
    clearResult();
  } else {
    inputRow.style.display  = 'none';
    resultBox.style.display = 'none';
    askBox.style.display    = 'flex';
    startAskMode();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ASK MODE
// AI generates 2 questions with 3 answer choices each from the image.
// User clicks a choice → AI reveals if correct + short explanation.
// ─────────────────────────────────────────────────────────────────────────────
const SYS_GENERATE_QS = `You receive a verbatim transcript of image content.
Generate exactly 2 multiple-choice questions about the content. Each question must have exactly 3 answer choices.
One choice must be correct, the other two plausible but wrong.

Respond ONLY with raw JSON — no markdown, no explanation, nothing else outside the JSON.
Format exactly:
[
  {
    "q": "Question text here?",
    "choices": ["Choice A text", "Choice B text", "Choice C text"],
    "correct": 0,
    "explanation": "Short friendly explanation of why the answer is correct."
  },
  {
    "q": "Second question text here?",
    "choices": ["Choice A text", "Choice B text", "Choice C text"],
    "correct": 1,
    "explanation": "Short friendly explanation of why the answer is correct."
  }
]

Rules:
- Questions must be specific and answerable from the image content
- Choices should be realistic — wrong ones should look plausible
- "correct" is the 0-based index of the correct choice (0, 1, or 2)
- Explanation should be 1-2 sentences, friendly tone, like a teacher explaining
- Use the same language as the image content`;

let askQuestions   = [];
let askCurrent     = 0;
let askAnswered    = false;

async function startAskMode() {
  if (!imgB64) return;
  askQuestions = [];
  askCurrent   = 0;
  askAnswered  = false;

  const askPulse  = document.getElementById('ask-pulse');
  const askLabel  = document.getElementById('ask-header-label');
  const askBody   = document.getElementById('ask-body');
  const dot0      = document.getElementById('dot-0');
  const dot1      = document.getElementById('dot-1');

  askPulse.classList.add('on');
  askLabel.textContent = 'generating questions…';
  dot0.className = 'ask-dot';
  dot1.className = 'ask-dot';
  askBody.innerHTML = '<div class="ask-loading"><span class="cursor-blink"></span> Reading image…</div>';

  try {
    // Step 1 — transcribe image
    const visionContent = [
      { type: 'image_url', image_url: { url: imgDataUrl } },
      { type: 'text', text: 'Extract all text and content from this image verbatim.' }
    ];
    const transcript = await callMistral(SYS_TRANSCRIBE, visionContent, MODEL_VISION);

    askBody.innerHTML = '<div class="ask-loading"><span class="cursor-blink"></span> Writing questions…</div>';
    await sleep(2000);

    // Step 2 — generate questions from transcript
    const prompt = `TRANSCRIPT:
${transcript}

Generate 2 multiple-choice questions with 3 choices each.`;
    const raw = await callMistral(SYS_GENERATE_QS, prompt, 'mistral-small-latest');

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      throw new Error('Could not parse questions — try again');
    }

    if (!Array.isArray(parsed) || parsed.length < 2) throw new Error('Not enough questions generated');
    askQuestions = parsed.slice(0, 2);

    askPulse.classList.remove('on');
    askLabel.textContent = 'question 1 of 2';
    dot0.className = 'ask-dot active';

    renderAskQuestion(0);

  } catch(err) {
    askPulse.classList.remove('on');
    askBody.innerHTML = `<div class="ask-loading" style="color:var(--error)">Failed: ${err.message}</div>`;
  }
}

function renderAskQuestion(idx) {
  const q      = askQuestions[idx];
  const body   = document.getElementById('ask-body');
  const label  = document.getElementById('ask-header-label');
  const dot0   = document.getElementById('dot-0');
  const dot1   = document.getElementById('dot-1');
  const letters = ['A', 'B', 'C'];

  label.textContent = `question ${idx + 1} of 2`;
  if (idx === 0) { dot0.className = 'ask-dot active'; dot1.className = 'ask-dot'; }
  else           { dot0.className = 'ask-dot done';   dot1.className = 'ask-dot active'; }

  askAnswered = false;

  const choicesHTML = q.choices.map((c, i) => `
    <div class="ask-choice" data-idx="${i}" onclick="pickChoice(${idx}, ${i})">
      <div class="ask-letter">${letters[i]}</div>
      <span>${c}</span>
    </div>
  `).join('');

  body.innerHTML = `
    <div class="ask-question">${q.q}</div>
    <div class="ask-choices" id="choices-${idx}">${choicesHTML}</div>
    <div class="ask-feedback" id="feedback-${idx}"></div>
    <button class="ask-next-btn" id="next-btn-${idx}" onclick="nextQuestion(${idx})">
      ${idx === 0 ? 'Next question →' : 'See results →'}
    </button>
  `;
}

function pickChoice(qIdx, choiceIdx) {
  if (askAnswered) return;
  askAnswered = true;

  const q        = askQuestions[qIdx];
  const correct  = q.correct;
  const choices  = document.querySelectorAll(`#choices-${qIdx} .ask-choice`);
  const feedback = document.getElementById(`feedback-${qIdx}`);
  const nextBtn  = document.getElementById(`next-btn-${qIdx}`);
  const letters  = ['A', 'B', 'C'];

  choices.forEach((el, i) => {
    if (i === correct) el.classList.add('correct');
    else if (i === choiceIdx && i !== correct) el.classList.add('wrong');
    else el.style.opacity = '.4';
  });

  const gotIt = choiceIdx === correct;
  feedback.textContent = (gotIt ? '✓ ' : '✗ ') + q.explanation;
  feedback.className   = 'ask-feedback visible';
  feedback.style.borderLeftColor = gotIt ? 'rgba(0,255,200,.5)' : 'rgba(255,77,106,.4)';
  feedback.style.color = gotIt ? 'var(--accent2)' : '#cccce0';

  nextBtn.style.display = 'flex';
}

function nextQuestion(idx) {
  if (idx === 0) {
    askCurrent = 1;
    renderAskQuestion(1);
  } else {
    // Both done — show final screen
    const dot0  = document.getElementById('dot-0');
    const dot1  = document.getElementById('dot-1');
    const label = document.getElementById('ask-header-label');
    dot0.className = 'ask-dot done';
    dot1.className = 'ask-dot done';
    label.textContent = 'done!';

    const body = document.getElementById('ask-body');
    body.innerHTML = `
      <div style="text-align:center; padding:.5rem 0 .25rem; font-family:'Inter',sans-serif; color:var(--muted2); font-size:13px;">
        Questions answered! Switch back to Analyse mode to ask more.
      </div>
      <button class="ask-next-btn" style="align-self:center; margin:.25rem 0"
        onclick="startAskMode()">Try again ↺</button>
    `;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, type = '') {
  clearTimeout(_tt);
  toastEl.textContent = msg;
  toastEl.className = `show ${type}`;
  _tt = setTimeout(() => toastEl.className = '', 3500);
}
</script>
